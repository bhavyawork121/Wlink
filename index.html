<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#25D366">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="WA Direct">
    <title>WA Direct - WhatsApp Number Redirect</title>
    <link rel="manifest" href="manifest.json">
    <!-- Favicon: Green circle with white 'W' -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%2325D366'/><text x='50' y='65' font-family='Arial' font-weight='bold' font-size='50' text-anchor='middle' fill='white'>W</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfbf7; /* Creamy White */
            --pattern-color: rgba(37, 211, 102, 0.05);
            --container-bg: rgba(255, 255, 255, 0.7);
            --container-border: rgba(37, 211, 102, 0.15);
            --text-color: #075e54; /* Deep Forest Green */
            --secondary-text: #4a665a;
            --accent-color: #25d366; /* WhatsApp Green */
            --accent-hover: #20bd5a;
            --error-color: #ea0038;
            --warning-color: #ffbc00;
            --input-bg: rgba(255, 255, 255, 0.8);
            --input-border: rgba(37, 211, 102, 0.2);
            --input-focus: #25d366;
            --history-bg: rgba(37, 211, 102, 0.05);
            --history-hover: rgba(37, 211, 102, 0.12);
            --shadow: 0 12px 40px rgba(7, 94, 84, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #051a11; /* Very Dark Forest Green */
                --pattern-color: rgba(255, 255, 255, 0.02);
                --container-bg: rgba(255, 255, 255, 0.04);
                --container-border: rgba(37, 211, 102, 0.1);
                --text-color: #e6eee3; /* Creamy Light Text */
                --secondary-text: #8ea195;
                --input-bg: rgba(255, 255, 255, 0.03);
                --input-border: rgba(255, 255, 255, 0.1);
                --history-bg: rgba(255, 255, 255, 0.02);
                --history-hover: rgba(37, 211, 102, 0.15);
                --shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(45deg, var(--pattern-color) 25%, transparent 25%), 
                linear-gradient(-45deg, var(--pattern-color) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, var(--pattern-color) 75%), 
                linear-gradient(-45deg, transparent 75%, var(--pattern-color) 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.5s ease;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 600px;
            background-color: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid var(--container-border);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--accent-color);
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--secondary-text);
            font-size: 15px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-color);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
        }

        select, input[type="text"], textarea {
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: var(--transition);
        }

        select {
            cursor: pointer;
            padding-right: 10px;
        }

        input[type="text"] {
            flex: 1;
            font-size: 18px;
        }

        input[type="text"]::placeholder, textarea::placeholder {
            color: rgba(37, 211, 102, 0.4);
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.2);
            background-color: rgba(255, 255, 255, 0.1);
        }

        textarea {
            width: 100%;
            border-radius: 16px;
            resize: vertical;
            min-height: 100px;
        }

        .error-message {
            color: var(--error-color);
            font-size: 13px;
            margin-top: 8px;
            height: 18px;
            font-weight: 500;
        }

        .warning-message {
            color: var(--warning-color);
            font-size: 13px;
            margin-top: 8px;
            font-weight: 500;
        }

        .button-group {
            display: flex;
            gap: 16px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.4);
        }

        .btn-secondary {
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--container-border);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background-color: var(--history-hover);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .install-btn {
            position: absolute;
            top: 18px;
            right: 18px;
            width: auto;
            flex: none;
            padding: 8px 14px;
            border: 1px solid rgba(37, 211, 102, 0.55);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.14);
            color: var(--text-color);
            font-size: 12px;
            font-weight: 700;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 24px rgba(7, 94, 84, 0.12);
            display: none;
            z-index: 2;
        }

        .install-btn:hover {
            background: rgba(37, 211, 102, 0.12);
            border-color: var(--accent-color);
        }

        .history-section {
            margin-top: 45px;
            padding-top: 30px;
            border-top: 1px solid var(--container-border);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .history-header h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--secondary-text);
            font-weight: 600;
        }

        .btn-clear {
            background: transparent;
            color: var(--secondary-text);
            font-size: 12px;
            padding: 6px 12px;
            width: auto;
            flex: none;
            border: 1px solid var(--container-border);
            border-radius: 10px;
        }

        .btn-clear:hover {
            background: rgba(234, 0, 56, 0.1);
            color: var(--error-color);
            border-color: rgba(234, 0, 56, 0.2);
        }

        .history-list {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background-color: var(--history-bg);
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .history-item:hover {
            background-color: var(--history-hover);
            border-color: var(--accent-color);
            transform: translateX(5px);
        }

        .history-item .number {
            font-weight: 600;
            color: var(--text-color);
        }

        .history-item .time {
            font-size: 12px;
            color: var(--secondary-text);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--accent-color);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: var(--transition);
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            bottom: 40px;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            border-color: var(--error-color) !important;
        }

        .shortcuts-hint {
            margin-top: 30px;
            text-align: center;
            font-size: 11px;
            color: var(--secondary-text);
            opacity: 0.6;
            font-weight: 500;
        }

        kbd {
            background: var(--input-bg);
            padding: 3px 6px;
            border-radius: 6px;
            font-size: 10px;
            border: 1px solid var(--container-border);
            margin: 0 2px;
            color: var(--text-color);
        }

        @media (max-width: 640px) {
            .container {
                padding: 64px 22px 36px;
            }

            .install-btn {
                top: 14px;
                right: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button id="install-btn" class="install-btn" type="button">Install App</button>
        <header>
            <h1>WA Direct</h1>
            <p class="subtitle">Quickly chat on WhatsApp without saving contacts</p>
        </header>

        <div class="form-group">
            <label for="phone-input">Phone Number</label>
            <div class="input-wrapper">
                <select id="country-code" title="Select Country Code">
                    <!-- Loaded via JS -->
                </select>
                <input type="text" id="phone-input" placeholder="Enter number with country code" autocomplete="off" autofocus>
            </div>
            <div id="validation-msg" class="error-message"></div>
            <div id="warning-msg" class="warning-message"></div>
        </div>

        <div class="form-group">
            <label for="message-input">Optional Message</label>
            <textarea id="message-input" placeholder="Pre-fill a message (optional)"></textarea>
        </div>

        <div class="button-group">
            <button id="open-btn" class="btn-primary" disabled>
                Open WhatsApp
            </button>
            <button id="copy-btn" class="btn-secondary">
                Copy Link
            </button>
        </div>

        <div id="history-container" class="history-section" style="display: none;">
            <div class="history-header">
                <h2>Recent Numbers</h2>
                <button id="clear-history" class="btn-clear">Clear history</button>
            </div>
            <ul id="history-list" class="history-list"></ul>
        </div>

        <div class="shortcuts-hint">
            <kbd>Enter</kbd> Open &nbsp; <kbd>Ctrl+L</kbd> Focus &nbsp; <kbd>Esc</kbd> Clear
        </div>
    </div>

    <div id="toast" class="toast">Copied!</div>

    <script>
        const countries = [
            { name: "India", code: "91" },
            { name: "USA", code: "1" },
            { name: "UK", code: "44" },
            { name: "UAE", code: "971" },
            { name: "Saudi Arabia", code: "966" },
            { name: "Pakistan", code: "92" },
            { name: "Bangladesh", code: "880" },
            { name: "Nepal", code: "977" },
            { name: "Canada", code: "1" },
            { name: "Australia", code: "61" },
            { name: "Germany", code: "49" },
            { name: "France", code: "33" },
            { name: "Singapore", code: "65" },
            { name: "Malaysia", code: "60" },
            { name: "Indonesia", code: "62" },
            { name: "Nigeria", code: "234" },
            { name: "Kenya", code: "254" },
            { name: "Brazil", code: "55" },
            { name: "South Africa", code: "27" },
            { name: "Qatar", code: "974" }
        ];

        const phoneInput = document.getElementById('phone-input');
        const countrySelect = document.getElementById('country-code');
        const messageInput = document.getElementById('message-input');
        const openBtn = document.getElementById('open-btn');
        const copyBtn = document.getElementById('copy-btn');
        const validationMsg = document.getElementById('validation-msg');
        const warningMsg = document.getElementById('warning-msg');
        const historyContainer = document.getElementById('history-container');
        const historyList = document.getElementById('history-list');
        const clearHistoryBtn = document.getElementById('clear-history');
        const toast = document.getElementById('toast');
        const installBtn = document.getElementById('install-btn');
        let deferredInstallPrompt = null;

        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
            installBtn.style.display = 'none';
        }

        // Populate countries
        countries.forEach(country => {
            const option = document.createElement('option');
            option.value = country.code;
            option.textContent = `${country.name} (+${country.code})`;
            if (country.code === "91") option.selected = true;
            countrySelect.appendChild(option);
        });

        // Initialize history
        let history = JSON.parse(localStorage.getItem('wa_history') || '[]');
        renderHistory();

        // Country code selection
        countrySelect.addEventListener('change', () => {
            const code = countrySelect.value;
            // Prepend if input doesn't already start with a likely code
            // For simplicity, just set the value if empty, or replace start if it looks like a code
            if (phoneInput.value.length < 5) {
                phoneInput.value = code + phoneInput.value.replace(/^\d{1,4}/, '');
            } else if (!phoneInput.value.startsWith(code)) {
                phoneInput.value = code + phoneInput.value;
            }
            validate();
            phoneInput.focus();
        });

        // Input cleaning and validation
        phoneInput.addEventListener('input', () => {
            // Auto-strip non-digits
            phoneInput.value = phoneInput.value.replace(/[^\d]/g, '');
            validate();
        });

        function validate() {
            const val = phoneInput.value;
            openBtn.disabled = val.length === 0;
            
            validationMsg.textContent = "";
            warningMsg.textContent = "";
            phoneInput.classList.remove('shake');

            if (val.length > 0) {
                if (val.startsWith('0')) {
                    warningMsg.textContent = "Remove leading 0. Use country code instead.";
                }
                if (val.length < 7 || val.length > 15) {
                    validationMsg.textContent = "Enter a valid number (7–15 digits)";
                }
            }
        }

        function getUrl() {
            const num = phoneInput.value;
            const msg = messageInput.value.trim();
            let url = `https://wa.me/${num}`;
            if (msg) {
                url += `?text=${encodeURIComponent(msg)}`;
            }
            return url;
        }

        function handleOpen() {
            const val = phoneInput.value;
            if (val.length === 0) {
                phoneInput.classList.add('shake');
                setTimeout(() => phoneInput.classList.remove('shake'), 400);
                return;
            }

            if (val.length >= 7 && val.length <= 15) {
                window.open(getUrl(), '_blank');
                addToHistory(val);
            } else {
                phoneInput.classList.add('shake');
                setTimeout(() => phoneInput.classList.remove('shake'), 400);
            }
        }

        function handleCopy() {
            const val = phoneInput.value;
            if (val.length < 7 || val.length > 15) {
                phoneInput.classList.add('shake');
                setTimeout(() => phoneInput.classList.remove('shake'), 400);
                return;
            }

            navigator.clipboard.writeText(getUrl()).then(() => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }

        function addToHistory(num) {
            // Remove if already exists
            history = history.filter(item => item.number !== num);
            // Add to front
            history.unshift({ number: num, timestamp: Date.now() });
            // Keep last 10
            history = history.slice(0, 10);
            localStorage.setItem('wa_history', JSON.stringify(history));
            renderHistory();
        }

        function timeAgo(prevTime) {
            const diff = Math.floor((Date.now() - prevTime) / 1000);
            if (diff < 60) return "Just now";
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
            return `${Math.floor(diff / 86400)}d ago`;
        }

        function renderHistory() {
            if (history.length === 0) {
                historyContainer.style.display = 'none';
                return;
            }
            historyContainer.style.display = 'block';
            historyList.innerHTML = '';
            history.forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <span class="number">+${item.number}</span>
                    <span class="time">${timeAgo(item.timestamp)}</span>
                `;
                li.onclick = () => {
                    phoneInput.value = item.number;
                    validate();
                    phoneInput.focus();
                };
                historyList.appendChild(li);
            });
        }

        openBtn.addEventListener('click', handleOpen);
        copyBtn.addEventListener('click', handleCopy);
        clearHistoryBtn.addEventListener('click', () => {
            history = [];
            localStorage.removeItem('wa_history');
            renderHistory();
        });

        // Keyboard Shortcuts
        window.addEventListener('keydown', (e) => {
            // Enter
            if (e.key === 'Enter') {
                // If in textarea, standard Enter works. If not, trigger open.
                if (document.activeElement !== messageInput) {
                    handleOpen();
                }
            }
            // Ctrl+L (Clear and focus)
            if (e.ctrlKey && e.key.toLowerCase() === 'l') {
                e.preventDefault();
                phoneInput.value = '';
                messageInput.value = '';
                validate();
                phoneInput.focus();
            }
            // Escape (Clear)
            if (e.key === 'Escape') {
                phoneInput.value = '';
                messageInput.value = '';
                validate();
                phoneInput.blur();
            }
        });

        // Support Enter in textarea as well if we want it to trigger, but usually textarea Enter is for new lines.
        // User said: "Enter key works from both input and textarea"
        // Let's refine the textarea behavior: Shift+Enter for new line, Enter for submit?
        // Or just Enter for submit if text is short? The prompt says "Enter key triggers the action".
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleOpen();
            }
        });

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredInstallPrompt = e;
            installBtn.style.display = 'inline-flex';
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredInstallPrompt) return;

            deferredInstallPrompt.prompt();
            const { outcome } = await deferredInstallPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.style.display = 'none';
            }
            deferredInstallPrompt = null;
        });

        window.addEventListener('appinstalled', () => {
            deferredInstallPrompt = null;
            installBtn.style.display = 'none';
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

    </script>
</body>
</html>
